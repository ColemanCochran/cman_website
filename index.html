<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coleman Cochran</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: #0d0d0d;
      color: #e8e8e8;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
    }

    /* CRT scanlines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px, transparent 1px,
        rgba(0,0,0,0.07) 1px, rgba(0,0,0,0.07) 2px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* ── Mode bar ───────────────────────────────────────────────── */
    #mode-bar {
      display: flex;
      gap: 8px;
      padding: 8px 28px;
      background: #111;
      border-bottom: 1px solid #1c1c1c;
      flex-shrink: 0;
    }

    .mode-btn {
      background: transparent;
      border: 1px solid #333;
      color: #555;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      padding: 4px 14px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: border-color 0.1s, color 0.1s;
    }

    .mode-btn.active {
      border-color: #e8e8e8;
      color: #e8e8e8;
    }

    .mode-btn:hover:not(.active) {
      border-color: #888;
      color: #888;
    }

    /* ── Terminal view ──────────────────────────────────────────── */
    #terminal-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #terminal {
      flex: 1;
      overflow-y: auto;
      padding: 20px 28px 12px;
    }

    #terminal::-webkit-scrollbar { width: 4px; }
    #terminal::-webkit-scrollbar-track { background: transparent; }
    #terminal::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }

    #ascii-header {
      white-space: pre;
      color: #e8e8e8;
      font-size: clamp(5px, 1.05vw, 11px);
      line-height: 1.15;
      text-shadow: 0 0 12px rgba(232,232,232,0.25);
      margin-bottom: 22px;
      overflow-x: hidden;
    }

    .ln { display: block; white-space: pre-wrap; word-break: break-word; }

    .out-block {
      color: #cccccc;
      white-space: pre-wrap;
      margin-bottom: 10px;
      display: block;
    }
    .out-block.green  { color: #e8e8e8; }
    .out-block.yellow { color: #ffd700; }
    .out-block.cyan   { color: #00d4ff; }
    .out-block.red    { color: #ff5555; }
    .out-block.dim    { color: #555555; }

    #input-line {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 9px 28px;
      border-top: 1px solid #1c1c1c;
      background: #111;
    }

    #prompt-label {
      color: #e8e8e8;
      white-space: nowrap;
      user-select: none;
    }

    #cmd-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e8e8e8;
      font-family: inherit;
      font-size: inherit;
      line-height: inherit;
      caret-color: #e8e8e8;
    }

    a { color: #4af; }
    a:hover { text-decoration: underline; }

    /* ── GUI view ───────────────────────────────────────────────── */
    #gui-view {
      flex: 1;
      overflow-y: auto;
      padding: 32px 28px;
      display: none;
    }

    #gui-view::-webkit-scrollbar { width: 4px; }
    #gui-view::-webkit-scrollbar-track { background: transparent; }
    #gui-view::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }

    .gui-header {
      margin-bottom: 28px;
    }

    .gui-header h1 {
      font-size: 18px;
      font-weight: normal;
      color: #e8e8e8;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .gui-header p {
      color: #444;
      font-size: 12px;
      margin-top: 5px;
    }

    .gui-nav {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      border-bottom: 1px solid #1c1c1c;
    }

    .gui-nav-btn {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: #555;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      padding: 6px 18px 8px;
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: -1px;
      transition: color 0.1s, border-color 0.1s;
    }

    .gui-nav-btn.active {
      border-bottom-color: #ffd700;
      color: #ffd700;
    }

    .gui-nav-btn:hover:not(.active) {
      color: #aaa;
    }

    .gui-section { display: none; }
    .gui-section.active { display: block; }

    .gui-text {
      color: #cccccc;
      white-space: pre-wrap;
      line-height: 1.9;
      max-width: 680px;
    }

    .gui-post-item {
      border-bottom: 1px solid #1c1c1c;
    }

    .gui-post-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      cursor: pointer;
      padding: 14px 0;
    }

    .gui-post-header:hover .gui-post-title {
      color: #ffd700;
    }

    .gui-post-title {
      color: #e8e8e8;
      font-size: 13px;
      transition: color 0.1s;
    }

    .gui-post-meta {
      color: #444;
      font-size: 11px;
      flex-shrink: 0;
      margin-left: 16px;
    }

    .gui-post-body {
      display: none;
      color: #cccccc;
      white-space: pre-wrap;
      padding: 0 0 16px 16px;
      border-left: 1px solid #2a2a2a;
      line-height: 1.9;
      font-size: 13px;
    }

    .gui-post-body.open { display: block; }

    .gui-contact-row {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 12px 0;
      border-bottom: 1px solid #1c1c1c;
    }

    .gui-contact-label {
      color: #444;
      font-size: 12px;
      width: 72px;
      flex-shrink: 0;
    }

    .gui-contact-value { color: #cccccc; }
    .gui-contact-value a { color: #4af; }

    .gui-project-card {
      display: block;
      padding: 16px 20px;
      border: 1px solid #2a2a2a;
      text-decoration: none;
      max-width: 320px;
      transition: border-color 0.1s;
    }

    .gui-project-card:hover { border-color: #ffd700; }

    .gui-project-name {
      color: #e8e8e8;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .gui-project-url {
      color: #4af;
      font-size: 12px;
    }
  </style>
</head>

Haven't done very much on here — summer at SpaceX has been busy.

I've really enjoyed what I've done this summer and am happy I'm
staying till September.

The most interesting thing I've learned about the company has been
from events with the CEO and CFO. The company is undeniably directed
toward reaching Mars — things like Starlink feel like "simple" (hehe)
intermediate steps. 

I've definitely taken the Mars pill and have adopted the SpaceX
perspective. I think once the AI hype wave runs its course, the space
industry will be next. AI or space: pick your poison.

Other than work, I've had to move three separate times with an
additional and final move approaching. I've been living out of
cardboard boxes and have been simulating the SF founder mode
experience. Fortunately, since I'm in Hawthorne for more than half
the week's hours, I go home, sleep, then leave in the morning.

I miss London and Europe. I talked a lot of trash about London,

I've completely redesigned (fixed) the website: a moment long

/* ── Output helpers ──────────────────────────────────────────────── */
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function print(html, cls = '') {
  const el = document.createElement('span');
  el.className = 'out-block ' + cls;
  el.innerHTML = html;
  output.appendChild(el);
  scrollDown();
}

function printText(text, cls = '') {
  print(esc(text), cls);
}

function printRaw(html) {
  const el = document.createElement('span');
  el.className = 'ln';
  el.innerHTML = html;
  output.appendChild(el);
  scrollDown();
}

function scrollDown() {
  terminal.scrollTop = terminal.scrollHeight;
}

/* ── Tab completion ──────────────────────────────────────────────── */
const ALL_CMDS     = Object.keys(CMDS);
const POST_FILES   = Object.keys(FS['posts/']).map(f => 'posts/' + f);
const BARE_POSTS   = Object.keys(FS['posts/']);
const TRAVEL_FILES = Object.keys(FS['travel_log/']).map(f => 'travel_log/' + f);
const BARE_TRAVEL  = Object.keys(FS['travel_log/']);

function completions(partial) {
  const parts = partial.trimStart().split(/\s+/);

  // Command name completion
  if (parts.length === 1) {
    return ALL_CMDS.filter(c => c.startsWith(parts[0]));
  }

  const cmd = parts[0];
  const arg = parts[parts.length - 1] || '';

  // cat: route by prefix, fall back to all flat names
  if (cmd === 'cat') {
    const pool = arg.startsWith('posts')
      ? POST_FILES
      : arg.startsWith('travel')
      ? TRAVEL_FILES
      : ['about.txt', 'contact.txt', ...BARE_POSTS, ...BARE_TRAVEL];
    return pool.filter(f => f.startsWith(arg));
  }

  // ls: valid directory arguments
  if (cmd === 'ls') {
    return ['posts/', 'travel_log/'].filter(f => f.startsWith(arg));
  }

  return [];
}

/* ── Input handling ──────────────────────────────────────────────── */
cmdInput.addEventListener('keydown', async e => {
  if (e.key === 'Enter') {
    if (isRunning) return;
    const raw = cmdInput.value;
    const trimmed = raw.trim();

    printRaw(
      `<span style="color:#aaaaaa">visitor</span><span style="color:#333">@</span><span style="color:#e8e8e8">cochran</span><span style="color:#333">:~$</span> <span style="color:#e8e8e8">${esc(raw)}</span>`
    );
    cmdInput.value = '';

    if (trimmed) {
      cmdHistory.push(trimmed);
      histIdx = cmdHistory.length;
      isRunning = true;
      await runCmd(trimmed);
      isRunning = false;
    }
    scrollDown();
    return;
  }

  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx > 0) { histIdx--; cmdInput.value = cmdHistory[histIdx]; }
    return;
  }

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx < cmdHistory.length - 1) { histIdx++; cmdInput.value = cmdHistory[histIdx]; }
    else { histIdx = cmdHistory.length; cmdInput.value = ''; }
    return;
  }

  if (e.key === 'Tab') {
    e.preventDefault();
    const comp = completions(cmdInput.value);
    if (comp.length === 1) {
      const parts = cmdInput.value.trimStart().split(/\s+/);
      if (parts.length === 1) {
        cmdInput.value = comp[0] + ' ';
      } else {
        parts[parts.length - 1] = comp[0];
        cmdInput.value = parts.join(' ') + ' ';
      }
    } else if (comp.length > 1) {
      printRaw(
        `<span style="color:#aaaaaa">visitor</span><span style="color:#333">@</span><span style="color:#e8e8e8">cochran</span><span style="color:#333">:~$</span> <span style="color:#e8e8e8">${esc(cmdInput.value)}</span>`
      );
      printText(comp.join('   '), 'dim');
    }
    return;
  }

  if (e.ctrlKey && e.key === 'c') {
    e.preventDefault();
    printRaw(
      `<span style="color:#aaaaaa">visitor</span><span style="color:#333">@</span><span style="color:#e8e8e8">cochran</span><span style="color:#333">:~$</span> <span style="color:#e8e8e8">${esc(cmdInput.value)}^C</span>`
    );
    cmdInput.value = '';
    return;
  }

  if (e.ctrlKey && e.key === 'l') {
    e.preventDefault();
    CMDS.clear();
    return;
  }
});

/* ── Loader animation ────────────────────────────────────────────── */
function showLoader() {
  return new Promise(resolve => {
    const el = document.createElement('span');
    el.className = 'out-block dim';
    output.appendChild(el);
    scrollDown();

    const steps = [0, 12, 26, 42, 58, 72, 84, 93, 100];
    const W = 20;
    let i = 0;

    function tick() {
      const pct    = steps[i];
      const filled = Math.round(pct / 100 * W);
      el.textContent = `[${'#'.repeat(filled)}${'.'.repeat(W - filled)}] ${pct}%`;
      scrollDown();
      i++;
      if (i < steps.length) {
        setTimeout(tick, 35);
      } else {
        setTimeout(() => { el.remove(); resolve(); }, 70);
      }
    }
    tick();
  });
}

async function runCmd(raw) {
  const parts = raw.trim().split(/\s+/);
  const cmd   = parts[0].toLowerCase();
  const args  = parts.slice(1);
  await showLoader();
  if (CMDS[cmd]) {
    CMDS[cmd](args);
  } else {
    print(`<span style="color:#ff5555">command not found: ${esc(cmd)}</span>   <span style="color:#555">try <span style="color:#e8e8e8">help</span></span>`);
  }
  printRaw('');
}

/* ── Mode switching ──────────────────────────────────────────────── */
function setMode(mode) {
  const termView = document.getElementById('terminal-view');
  const guiView  = document.getElementById('gui-view');
  const btnT     = document.getElementById('btn-terminal');

  if (mode === 'terminal') {
    termView.style.display = 'flex';
    guiView.style.display  = 'none';
    btnT.classList.add('active');
    cmdInput.focus();
  } else {
    termView.style.display = 'none';
    guiView.style.display  = 'block';
    btnT.classList.remove('active');
    buildGUI();
  }
}

/* ── GUI builder (runs once) ─────────────────────────────────────── */
let guiBuilt = false;
function buildGUI() {
  if (guiBuilt) return;
  guiBuilt = true;

  document.getElementById('gui-about-text').textContent = FS['about.txt'];

  const postsList = document.getElementById('gui-posts-list');
  Object.entries(FS['posts/']).forEach(([, post]) => {
    const item = document.createElement('div');
    item.className = 'gui-post-item';

    const header = document.createElement('div');
    header.className = 'gui-post-header';
    header.innerHTML =
      `<span class="gui-post-title">${esc(post.title)}</span>` +
      `<span class="gui-post-meta">${esc(post.date)}</span>`;

    const body = document.createElement('div');
    body.className = 'gui-post-body';
    body.textContent = post.body;

    header.addEventListener('click', () => body.classList.toggle('open'));

    item.appendChild(header);
    item.appendChild(body);
    postsList.appendChild(item);
  });

  const travelList    = document.getElementById('gui-travel-list');
  const travelEntries = Object.entries(FS['travel_log/']);
  if (!travelEntries.length) {
    const placeholder = document.createElement('p');
    placeholder.style.cssText = 'color:#444;font-size:12px;padding-top:14px;';
    placeholder.textContent = 'No entries yet.';
    travelList.appendChild(placeholder);
  } else {
    travelEntries.forEach(([, entry]) => {
      const item = document.createElement('div');
      item.className = 'gui-post-item';

      const header = document.createElement('div');
      header.className = 'gui-post-header';
      header.innerHTML =
        `<span class="gui-post-title">${esc(entry.location)}</span>` +
        `<span class="gui-post-meta">${entry.date ? esc(entry.date) : ''}</span>`;

      item.appendChild(header);

      if (entry.body) {
        const body = document.createElement('div');
        body.className = 'gui-post-body';
        body.textContent = entry.body;
        header.addEventListener('click', () => body.classList.toggle('open'));
        item.appendChild(body);
      }

      travelList.appendChild(item);
    });
  }
}

/* ── GUI tab switching ───────────────────────────────────────────── */
function guiTab(name, btn) {
  document.querySelectorAll('.gui-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.gui-nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('gui-' + name).classList.add('active');
  btn.classList.add('active');
}
